<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Parent Work Locations</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", sans-serif; }
  #map { height: 100%; }
  #gate {
    position: fixed; inset: 0; z-index: 2000; background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
  }
  #gate .card {
    background: #fff; border-radius: 12px; padding: 28px 32px; width: 300px;
    box-shadow: 0 8px 30px rgba(0,0,0,.35); text-align: center;
  }
  #gate h1 { font-size: 16px; margin: 0 0 14px; color: #1a1a2e; }
  #gate input {
    width: 100%; box-sizing: border-box; padding: 9px 10px; font-size: 14px;
    border: 1px solid #cbd2dc; border-radius: 8px; margin-bottom: 10px;
  }
  #gate button {
    width: 100%; padding: 9px; font-size: 14px; border: 0; border-radius: 8px;
    background: #1a1a2e; color: #fff; cursor: pointer;
  }
  #gate .err { color: #b91c1c; font-size: 12.5px; min-height: 16px; margin-top: 8px; }
  .panel {
    position: absolute; top: 12px; right: 12px; z-index: 1000;
    background: rgba(255,255,255,.95); border-radius: 10px;
    box-shadow: 0 2px 10px rgba(0,0,0,.15); padding: 12px 16px;
    font-size: 13px; color: #1a1a2e; max-width: 260px;
  }
  .panel h1 { font-size: 14px; margin: 0 0 10px; }
  .seg { display: flex; border: 1px solid #cbd2dc; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
  .seg button {
    flex: 1; border: 0; background: #fff; padding: 6px 8px; font-size: 12.5px;
    cursor: pointer; color: #1a1a2e; border-right: 1px solid #cbd2dc;
  }
  .seg button:last-child { border-right: 0; }
  .seg button.active { background: #1a1a2e; color: #fff; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.25); }
  .star-swatch { color: #d4a017; font-size: 18px; line-height: 12px; }
  .campus-star { font-size: 30px; color: #d4a017; text-shadow: 0 0 3px #fff, 0 1px 2px rgba(0,0,0,.4); }
  .leaflet-tooltip.info-tip { font-size: 12.5px; line-height: 1.45; padding: 8px 10px; }
  .info-tip b { color: #1a1a2e; }
  .info-tip .lbl { color: #6b7280; }
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <h1>Parent Work Locations</h1>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <button id="unlock">Unlock</button>
    <div class="err" id="err"></div>
  </div>
</div>
<div id="map"></div>
<div class="panel" id="panel" hidden>
  <h1>Parent Work Locations</h1>
  <div class="seg" id="toggle"></div>
  <div class="legend-row"><span class="star-swatch">&#9733;</span> Campus</div>
  <div id="legend"></div>
</div>

async function decrypt(passphrase) {
  const keyMaterial = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(ENC.salt), iterations: ENC.iters, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv: b64(ENC.nonce) }, key, b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(plain));
}

  const COLORS = ["#3d6de0", "#c2410c", "#0e7490", "#7c3aed"];
  const colorOf = {};
  campusNames.forEach((n, i) => colorOf[n] = COLORS[i % COLORS.length]);

  const map = L.map("map");
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  const parentMarkers = parents.map(p => {
    const m = L.circleMarker([p.lat, p.lng], {
      radius: 6, weight: 1.5, color: "#ffffff",
      fillColor: colorOf[p.campus] || COLORS[0], fillOpacity: 0.9
    });
    m.bindTooltip(
      `<span class="lbl">Family Key:</span> <b>${p.key}</b><br>` +
      `<span class="lbl">Parent:</span> <b>${p.parent}</b><br>` +
      `<span class="lbl">Employer:</span> <b>${p.employer}</b><br>` +
      `<span class="lbl">Work Address:</span> ${p.address}`,
      { className: "info-tip", direction: "top", offset: [0, -6], sticky: true }
    );
    return { campus: p.campus, marker: m, lat: p.lat, lng: p.lng };
  });

  const campusMarkers = campuses.map(c => {
    const m = L.marker([c.lat, c.lng], {
      icon: L.divIcon({ className: "", html: '<div class="campus-star">&#9733;</div>', iconSize: [30, 30], iconAnchor: [15, 15] }),
      zIndexOffset: 1000
    });
    m.bindTooltip(
      `<span class="lbl">Campus:</span> <b>${c.name}</b><br>` +
      `<span class="lbl">Address:</span> ${c.address}`,
      { className: "info-tip", direction: "top", offset: [0, -14] }
    );
    return { campus: c.name, marker: m, lat: c.lat, lng: c.lng };
  });

  function show(selection) {
    const keep = n => selection === "All" || n === selection;
    const bounds = [];
    parentMarkers.forEach(p => {
      if (keep(p.campus)) { p.marker.addTo(map); bounds.push([p.lat, p.lng]); }
      else map.removeLayer(p.marker);
    });
    campusMarkers.forEach(c => {
      if (keep(c.campus)) { c.marker.addTo(map); bounds.push([c.lat, c.lng]); }
      else map.removeLayer(c.marker);
    });
    if (bounds.length) map.fitBounds(bounds, { padding: [40, 40] });
    document.querySelectorAll("#toggle button").forEach(b =>
      b.classList.toggle("active", b.dataset.sel === selection));
    document.getElementById("legend").innerHTML = campusNames
      .filter(keep)
      .map(n => {
        const count = parentMarkers.filter(p => p.campus === n).length;
        return `<div class="legend-row"><span class="dot" style="background:${colorOf[n]}"></span> ${n} parents (${count})</div>`;
      })
      .join("");
  }

  const toggle = document.getElementById("toggle");
  [...campusNames, "All"].forEach(sel => {
    const b = document.createElement("button");
    b.textContent = sel;
    b.dataset.sel = sel;
    b.onclick = () => show(sel);
    toggle.appendChild(b);
  });

  document.getElementById("panel").hidden = false;
  show(campusNames[0]);
}

async function tryUnlock() {
  const err = document.getElementById("err");
  err.textContent = "";
  try {
    const data = await decrypt(document.getElementById("pw").value);
    document.getElementById("gate").remove();
    initMap(data);
  } catch (e) {
    err.textContent = "Wrong password — try again.";
  }
}

document.getElementById("unlock").onclick = tryUnlock;
document.getElementById("pw").addEventListener("keydown", e => {
  if (e.key === "Enter") tryUnlock();
});
</script>
